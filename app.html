<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Force & Muscle">
<meta name="theme-color" content="#0a0a0a">
<title>Force & Muscle</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --black: #0a0a0a;
  --card: #1c1c1c;
  --border: #252525;
  --accent: #e8ff00;
  --accent2: #ff4d1c;
  --white: #f0ede6;
  --muted: #555;
  --tab-h: 72px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

html, body {
  height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: -webkit-fill-available;
}

.topbar {
  flex-shrink: 0;
  padding: calc(14px + var(--safe-t)) 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  background: var(--black);
  position: relative;
  z-index: 10;
}
.topbar::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(232,255,0,0.4), transparent);
}
.topbar-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; line-height: 1; letter-spacing: 1px;
}
.topbar-title span { color: var(--accent); }
.topbar-meta {
  font-size: 9px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); text-align: right; line-height: 1.7;
}

#screens {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px calc(20px + var(--tab-h) + var(--safe-b));
  opacity: 0;
  transform: translateX(30px);
  pointer-events: none;
  transition: opacity 0.28s cubic-bezier(.4,0,.2,1), transform 0.28s cubic-bezier(.4,0,.2,1);
}
.screen.active {
  opacity: 1;
  transform: translateX(0);
  pointer-events: all;
}

.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-b));
  padding-bottom: var(--safe-b);
  background: rgba(8,8,8,0.96);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}

.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  padding: 8px 4px;
  position: relative;
}

.tab-indicator {
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%) scaleX(0);
  width: 28px; height: 2px;
  background: var(--accent);
  transition: transform 0.25s cubic-bezier(.34,1.56,.64,1);
}
.tab.active .tab-indicator { transform: translateX(-50%) scaleX(1); }

.tab-icon { font-size: 21px; }
.tab.active .tab-icon { transform: scale(1.18) translateY(-2px); }

.tab-label {
  font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
  color: var(--muted);
}
.tab.active .tab-label { color: var(--accent); }

.day-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 10px;
  overflow: hidden;
  cursor: pointer;
}
.day-card.open { border-color: rgba(232,255,0,0.5); }
.day-card.rest { cursor: default; opacity: 0.55; }

.card-header { padding: 15px 16px; display: flex; align-items: center; gap: 13px; }
.card-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
.day-card.rest .card-dot { background: var(--muted); }
.card-info { flex: 1; }
.card-day { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
.card-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; line-height: 1.1; }
.card-muscles { font-size: 11px; color: #444; font-weight: 300; }
.card-chevron { font-size: 20px; color: #333; transition: transform 0.25s; }
.day-card.open .card-chevron { transform: rotate(90deg); color: var(--accent); }

.card-detail { max-height: 0; overflow: hidden; transition: max-height 0.45s ease; }
.card-detail.open { max-height: 3000px; }
.card-detail-inner { border-top: 1px solid var(--border); padding: 14px 16px 18px; }

.ex-row { display: flex; gap: 12px; padding: 11px 0; border-bottom: 1px solid #181818; }
.ex-num { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: #2a2a2a; width: 20px; }
.ex-name { font-size: 14px; font-weight: 500; color: var(--white); }
.ex-note { font-size: 11px; color: #4a4a4a; margin-top: 3px; }
.ex-chips { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
.chip { font-family: 'Bebas Neue', sans-serif; font-size: 12px; padding: 3px 8px; border-radius: 5px; }
.chip-sets { background: rgba(232,255,0,0.1); color: var(--accent); }
.chip-reps { background: rgba(255,255,255,0.05); color: #888; }

.tracker-form { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 20px; }
.form-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--accent); margin-bottom: 14px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.field.full { grid-column: 1 / -1; }
.field label { display: block; font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field input, .field select { width: 100%; background: #111; border: 1px solid var(--border); border-radius: 7px; color: var(--white); padding: 10px; font-size: 13px; outline: none; }

.save-btn { width: 100%; background: var(--accent); color: var(--black); border: none; border-radius: 8px; padding: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 17px; margin-top: 15px; cursor: pointer; }

.log-entry { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 13px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: flex-start; }
.log-exercise { font-size: 14px; font-weight: 500; }
.log-meta { font-size: 11px; color: var(--muted); }
.log-weight { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div id="app">

  <div class="topbar">
    <div class="topbar-title">FORCE <span>&</span> MUSCLE</div>
    <div class="topbar-meta">4J / SEM · PPL+FB</div>
  </div>

  <div id="screens">
    <div class="screen active" id="screen-programme">
      <div class="day-card" id="card-j1" onclick="toggleCard('j1')">
        <div class="card-header">
            <div class="card-dot"></div>
            <div class="card-info"><div class="card-day">Lundi</div><div class="card-name">POUSSÉE</div></div>
            <div class="card-chevron">›</div>
        </div>
        <div class="card-detail" id="detail-j1"><div class="card-detail-inner">
            <div class="ex-row"><div class="ex-num">1</div><div><div class="ex-name">Machine convergente à plat</div><div class="ex-chips"><span class="chip chip-sets">4 séries</span></div></div></div>
            <div class="ex-row"><div class="ex-num">2</div><div><div class="ex-name">Machine convergente inclinée</div><div class="ex-chips"><span class="chip chip-sets">4 séries</span></div></div></div>
        </div></div>
      </div>
      </div>

    <div class="screen" id="screen-principes">
        <div class="form-title">Principes d'entraînement</div>
        <p style="font-size:12px; color:#aaa;">Surcharge progressive, sommeil et nutrition.</p>
    </div>

    <div class="screen" id="screen-tracker">
      <div class="tracker-form">
        <div class="form-title">+ Nouvelle séance</div>
        <div class="form-grid">
          <div class="field full">
            <label>Date</label>
            <input type="date" id="t-date">
          </div>
          <div class="field full">
            <label>Séance</label>
            <select id="t-session">
              <option value="">Choisir la séance...</option>
              <option value="Jour 1 — Poussée">Jour 1 — Poussée</option>
              <option value="Jour 2 — Tirage">Jour 2 — Tirage</option>
              <option value="Jour 4 — Jambes">Jour 4 — Jambes</option>
              <option value="Jour 5 — Full Body">Jour 5 — Full Body</option>
            </select>
          </div>
          <div class="field full">
            <label>Exercice</label>
            <select id="t-exercise">
              <option value="">Sélectionnez une séance d'abord...</option>
            </select>
          </div>
          <div class="field">
            <label>Charge (kg)</label>
            <input type="number" id="t-weight" placeholder="Ex: 80">
          </div>
          <div class="field">
            <label>Séries × Reps</label>
            <input type="text" id="t-sets" placeholder="Ex: 4×8">
          </div>
        </div>
        <button class="save-btn" onclick="saveEntry()">ENREGISTRER</button>
      </div>
      <div id="logSection"></div>
    </div>
  </div>

  <div class="tabbar">
    <div class="tab active" id="tab-programme" onclick="switchTab('programme')">
      <div class="tab-indicator"></div><div class="tab-icon">🗓</div><div class="tab-label">Programme</div>
    </div>
    <div class="tab" id="tab-principes" onclick="switchTab('principes')">
      <div class="tab-indicator"></div><div class="tab-icon">⚡</div><div class="tab-label">Principes</div>
    </div>
    <div class="tab" id="tab-tracker" onclick="switchTab('tracker')">
      <div class="tab-indicator"></div><div class="tab-icon">📋</div><div class="tab-label">Suivi</div>
    </div>
  </div>
</div>

<script>
// --- DONNÉES ---
const exercicesParSeance = {
  "Jour 1 — Poussée": ["Machine convergente à plat", "Machine convergente inclinée", "Écarté cable basse poulie", "Développé militaire debout", "Élévations latérales cable", "Dips lestés", "Seated overhead dips", "Triceps poulie haute (corde)"],
  "Jour 2 — Tirage": ["Tirage vertical prise large", "Tirage vertical prise serrée neutre", "Low Row Machine TechnoGym", "Face pull corde", "Curl barre EZ", "Curl incliné haltères", "Curl marteau haltères"],
  "Jour 4 — Jambes": ["Squat barre haute", "Leg press 45°", "Romanian Deadlift", "Leg curl assis", "Leg curl couché", "Mollets debout machine"],
  "Jour 5 — Full Body": ["Soulevé de terre classique", "Machine convergente à plat", "Tractions lestées", "Développé militaire barre", "Ab wheel / Planche RKC"]
};

// --- LOGIQUE LIAISON ---
const sessionSelect = document.getElementById('t-session');
const exerciseSelect = document.getElementById('t-exercise');

sessionSelect.addEventListener('change', function() {
  const exercices = exercicesParSeance[this.value] || [];
  exerciseSelect.innerHTML = '<option value="">Choisir l\'exercice...</option>';
  exercices.forEach(ex => {
    const opt = document.createElement('option');
    opt.value = ex; opt.textContent = ex;
    exerciseSelect.appendChild(opt);
  });
});

// --- NAVIGATION ---
let currentTab = 'programme';
function switchTab(name) {
  document.getElementById('screen-' + currentTab).classList.remove('active');
  document.getElementById('tab-' + currentTab).classList.remove('active');
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  currentTab = name;
  if(name === 'tracker') renderLog();
}

// --- CARD EXPAND ---
function toggleCard(id) {
  document.getElementById('card-' + id).classList.toggle('open');
  document.getElementById('detail-' + id).classList.toggle('open');
}

// --- TRACKER LOGIC ---
let log = JSON.parse(localStorage.getItem('gymLog') || '[]');

function saveEntry() {
  const entry = {
    id: Date.now(),
    date: document.getElementById('t-date').value || new Date().toLocaleDateString('fr-FR'),
    exercise: exerciseSelect.value,
    weight: document.getElementById('t-weight').value,
    sets: document.getElementById('t-sets').value
  };
  if(!entry.exercise) return alert("Choisis un exercice !");
  log.unshift(entry);
  localStorage.setItem('gymLog', JSON.stringify(log));
  renderLog();
}

function renderLog() {
  const section = document.getElementById('logSection');
  section.innerHTML = log.map(e => `
    <div class="log-entry">
      <div>
        <div class="log-exercise">${e.exercise}</div>
        <div class="log-meta">${e.date} • ${e.sets || ''}</div>
      </div>
      <div class="log-weight">${e.weight || 0}kg</div>
    </div>
  `).join('');
}
</script>
</body>
</html>
