<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HK Focus">
    <title>HK Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
<div id="app">
  <div class="top-bar">
    <div class="logo">HK<em>/</em>FOCUS</div>
    <div class="top-right">
      <div class="streak" id="streakEl">&#x1F525; 0j</div>
    </div>
  </div>

  <div id="content">
    <div class="screen active" id="screen-home">
      <div class="week-nav">
        <button class="backbtn" onclick="changeWeek(-1)">&#x2039;</button>
        <div id="weekLabel"></div>
        <button class="backbtn" id="weekNextBtn" onclick="changeWeek(1)">&#x203A;</button>
      </div>
      <div class="wstrip" id="wstrip"></div>
      <div class="srow">
        <div class="mstat"><div class="msv" id="hw">-</div><div class="msl">KG</div></div>
        <div class="mstat"><div class="msv" id="hc">0</div><div class="msl">SEANCES</div></div>
        <div class="mstat"><div class="msv" id="hcy">S1</div><div class="msl">CYCLE</div></div>
      </div>
      <div class="stitle">AUJOURD'HUI</div>
      <div id="todayCard"></div>
    </div>

    <div class="screen" id="screen-workout">
      <div class="wtop">
        <div class="backbtn" onclick="goHome()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="16" height="16"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div>
          <div class="wbg" id="wkbg"></div>
          <div class="wtit" id="wktit"></div>
        </div>
      </div>
      <div class="voltk" id="voltk" style="display:none">
        <div class="voltit">VOLUME EN COURS</div>
        <div id="volrows"></div>
      </div>
      <div id="exlist"></div>
      <button class="finbtn" id="finbtn" onclick="finishWorkout()">&#x2713; Terminer</button>
      <div style="height:10px"></div>
    </div>

    <div class="screen" id="screen-poids">
      <div class="stitle">SUIVI DU POIDS</div>
      <div class="whero">
        <div><span class="wbig" id="wdisp">-</span><span class="wunit"> kg</span></div>
        <div class="wtrend" id="wtrend"></div>
      </div>
      <div class="wform">
        <input class="winp-text" id="winp" type="text" placeholder="65,0" inputmode="decimal">
        <button class="wlogbtn" onclick="saveWeight()">LOG</button>
      </div>
      <div class="chartwrap"><canvas id="wchart" height="160"></canvas></div>
      <div class="stitle">HISTORIQUE</div>
      <div id="whist"></div>
    </div>

    <div class="screen" id="screen-history">
      <div class="stitle">HISTORIQUE SEANCES</div>
      <div id="hlist"></div>
    </div>

    <div class="screen" id="screen-settings">
      <div class="stitle">REGLAGES</div>
      <div class="scard">
        <div class="schead">&#x1F4A7; OBJECTIF EAU</div>
        <div class="scrow"><div class="sclbl">Verres (250ml)</div><input class="scinp" id="swat" type="number" inputmode="numeric"></div>
        <button class="savbtn" onclick="saveSettings()">Enregistrer</button>
      </div>
      <div class="scard">
        <div class="schead">&#x1F4BE; SAUVEGARDE</div>
        <button class="savbtn" onclick="exportData()" style="margin-bottom:9px">&#x2B07; Exporter mes donnees</button>
        <label class="import-label">
          &#x2B06; Importer mes donnees
          <input type="file" accept=".json" onchange="importData(event)" style="display:none">
        </label>
      </div>
      <div class="scard" style="border-color:#f87171">
        <div class="schead" style="color:#f87171">&#x26A0;&#xFE0F; REINITIALISER</div>
        <button class="dngbtn" onclick="resetAll()">Tout reinitialiser</button>
      </div>
    </div>
  </div>

  <nav id="nav">
    <button class="nb active" onclick="showScreen('home')" id="nav-home">Accueil<div class="ndot"></div></button>
    <button class="nb" onclick="showScreen('poids')" id="nav-poids">Poids<div class="ndot"></div></button>
    <button class="nb" onclick="showScreen('history')" id="nav-history">Historique<div class="ndot"></div></button>
    <button class="nb" onclick="showScreen('settings')" id="nav-settings">Reglages<div class="ndot"></div></button>
  </nav>
</div>

<div class="restov" id="restov">
  <div class="restlbl">REPOS</div>
  <div class="restcnt" id="restcnt">90</div>
  <button class="restskip" onclick="skipRest()">Passer</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
